name: System Heartbeat

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch: {}

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Record heartbeat timestamp
        run: |
          mkdir -p .github/workflows
          echo "System Integrity Check: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> PULSE.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PULSE.md
          git commit -m "chore: heartbeat update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed (missing permissions)"
